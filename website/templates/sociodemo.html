<!DOCTYPE html>
<html>
<head>
    <title>Cuestionario Sociodemográfico - Estudio sobre efectos del Cannabis</title>
	<meta http-equiv="content-type" content="text/html; charset=utf-8"/>
	<meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width"/>
    <link rel="shortcut icon" href="static/img/favicon.ico" type="image/x-icon">
    <link rel="stylesheet" href="../static/css/style.css" type="text/css" media="screen" title="no title" charset="utf-8">
    <link rel="canonical" href="https://emar.cicea.uy">
</head>
<body>
    <h2>Cuestionario Sociodemográfico (1/7)</h2>
    <main>
    {% if existing_data %}
    <div style="background-color: #e3f2fd; padding: 15px; margin-bottom: 20px; border-left: 4px solid #2196F3; border-radius: 4px;">
        <strong>ℹ️ Información:</strong> Hemos cargado tus datos de la Ronda 1. Puedes revisarlos y modificarlos si es necesario, y completar las nuevas preguntas sobre salud mental.
    </div>
    {% endif %}
    <form action="/submit-sociodemo" method="post">

        <label for="name" class="info-q">1. Nombre y apellido:</label><br>
        <input type="text" id="name" name="name" value="{{ existing_data.name if existing_data else '' }}" required><br><br>

        <label for="age" class="info-q">2. Edad:</label><br>
        <input type="number" id="age" name="age" value="{{ existing_data.age if existing_data else '' }}" required><br><br>

        <label class="info-q">3. Sexo:</label><br>
        <input type="radio" id="male" name="sex" value="Varón" {% if existing_data and existing_data.sex == 'Varón' %}checked{% endif %} required onchange="genderCheck()">
        <label for="male">Varón</label><br>
        <input type="radio" id="female" name="sex" value="Mujer" {% if existing_data and existing_data.sex == 'Mujer' %}checked{% endif %} onchange="genderCheck()">
        <label for="female">Mujer</label><br>
        <input type="radio" id="no_say" name="sex" value="Prefiero no decirlo" {% if existing_data and existing_data.sex == 'Prefiero no decirlo' %}checked{% endif %} onchange="genderCheck()">
        <label for="no_say">Prefiero no decirlo</label><br>
        <input type="radio" id="self_describe" name="sex" value="Prefiero autodescribirme" {% if existing_data and existing_data.sex == 'Prefiero autodescribirme' %}checked{% endif %} onchange="genderCheck()">
        <label for="self_describe">Prefiero autodescribirme</label>
        <div id="div-prefiero" style="display: {% if existing_data and existing_data.sex == 'Prefiero autodescribirme' %}block{% else %}none{% endif %};">
            <input type="text" id="prefiero-text" name="prefiero-text" value="{{ existing_data.prefiero_text if existing_data else '' }}">
        </div>
        <br><br>

        <label for="education" class="info-q">4. Nivel educativo:</label><br>
        <select name="education" id="education" required>
            <option value="" {% if not existing_data or not existing_data.education_level %}selected disabled{% endif %}>Elige una opción</option>
            <option value="Primaria incompleta" {% if existing_data and existing_data.education_level == 'Primaria incompleta' %}selected{% endif %}>Primaria incompleta</option>
            <option value="Primaria completa" {% if existing_data and existing_data.education_level == 'Primaria completa' %}selected{% endif %}>Primaria completa</option>
            <option value="Secundaria incompleta" {% if existing_data and existing_data.education_level == 'Secundaria incompleta' %}selected{% endif %}>Secundaria incompleta</option>
            <option value="Secundaria completa" {% if existing_data and existing_data.education_level == 'Secundaria completa' %}selected{% endif %}>Secundaria completa</option>
            <option value="Terciaria incompleta" {% if existing_data and existing_data.education_level == 'Terciaria incompleta' %}selected{% endif %}>Terciaria incompleta</option>
            <option value="Terciaria completa" {% if existing_data and existing_data.education_level == 'Terciaria completa' %}selected{% endif %}>Terciaria completa</option>
        </select><br><br>

        <label for="country" class="info-q">5. País de origen:</label><br>
        <input type="text" id="country" name="country" value="{{ existing_data.country_of_origin if existing_data else '' }}" required><br><br>

        <label for="residence" class="info-q">6. Departamento de residencia:</label><br>
        <select id="residence" name="residence" required>
            <option value="" {% if not existing_data or not existing_data.residence %}selected disabled{% endif %}>Elige una opción</option>
            <option value="No resido en Uruguay" {% if existing_data and existing_data.residence == 'No resido en Uruguay' %}selected{% endif %}>No resido en Uruguay</option>
            <option value="Artigas" {% if existing_data and existing_data.residence == 'Artigas' %}selected{% endif %}>Artigas</option>
            <option value="Canelones" {% if existing_data and existing_data.residence == 'Canelones' %}selected{% endif %}>Canelones</option>
            <option value="Cerro Largo" {% if existing_data and existing_data.residence == 'Cerro Largo' %}selected{% endif %}>Cerro Largo</option>
            <option value="Colonia" {% if existing_data and existing_data.residence == 'Colonia' %}selected{% endif %}>Colonia</option>
            <option value="Durazno" {% if existing_data and existing_data.residence == 'Durazno' %}selected{% endif %}>Durazno</option>
            <option value="Flores" {% if existing_data and existing_data.residence == 'Flores' %}selected{% endif %}>Flores</option>
            <option value="Florida" {% if existing_data and existing_data.residence == 'Florida' %}selected{% endif %}>Florida</option>
            <option value="Lavalleja" {% if existing_data and existing_data.residence == 'Lavalleja' %}selected{% endif %}>Lavalleja</option>
            <option value="Maldonado" {% if existing_data and existing_data.residence == 'Maldonado' %}selected{% endif %}>Maldonado</option>
            <option value="Montevideo" {% if existing_data and existing_data.residence == 'Montevideo' %}selected{% endif %}>Montevideo</option>
            <option value="Paysandú" {% if existing_data and existing_data.residence == 'Paysandú' %}selected{% endif %}>Paysandú</option>
            <option value="Río Negro" {% if existing_data and existing_data.residence == 'Río Negro' %}selected{% endif %}>Río Negro</option>
            <option value="Rivera" {% if existing_data and existing_data.residence == 'Rivera' %}selected{% endif %}>Rivera</option>
            <option value="Rocha" {% if existing_data and existing_data.residence == 'Rocha' %}selected{% endif %}>Rocha</option>
            <option value="Salto" {% if existing_data and existing_data.residence == 'Salto' %}selected{% endif %}>Salto</option>
            <option value="San José" {% if existing_data and existing_data.residence == 'San José' %}selected{% endif %}>San José</option>
            <option value="Soriano" {% if existing_data and existing_data.residence == 'Soriano' %}selected{% endif %}>Soriano</option>
            <option value="Tacuarembó" {% if existing_data and existing_data.residence == 'Tacuarembó' %}selected{% endif %}>Tacuarembó</option>
            <option value="Treinta y Tres" {% if existing_data and existing_data.residence == 'Treinta y Tres' %}selected{% endif %}>Treinta y Tres</option>
        </select><br><br>

        <label for="email" class="info-q">7. Mail:</label><br>
        <input type="email" id="email" name="email" value="{{ existing_data.email if existing_data else '' }}" required><br><br>

        <label for="phone" class="info-q">8. Teléfono:</label><br>
        <input type="tel" id="phone" name="phone" value="{{ existing_data.phone if existing_data else '' }}" required><br><br>

        <hr>
        <h3>Salud Mental</h3>

        <label class="info-q">9. ¿Qué familiares (hermanos/as, padres, abuelos) tienen un diagnóstico de alguna patología de salud mental tales como ansiedad, depresión, trastorno bipolar o esquizofrenia?</label><br>
        <input type="checkbox" id="fam_hermano" name="fam_hermano" value="Hermano/a">
        <label for="fam_hermano">Hermano/a</label><br>
        <input type="checkbox" id="fam_padre" name="fam_padre" value="Padre">
        <label for="fam_padre">Padre</label><br>
        <input type="checkbox" id="fam_madre" name="fam_madre" value="Madre">
        <label for="fam_madre">Madre</label><br>
        <input type="checkbox" id="fam_abuelo" name="fam_abuelo" value="Abuelo/a">
        <label for="fam_abuelo">Abuelo/a</label><br>
        <input type="checkbox" id="fam_ninguno" name="fam_ninguno" value="Ninguno">
        <label for="fam_ninguno">Ninguno</label><br><br>

        <label class="info-q">10. ¿Tomás psicofármacos?</label><br>
        <input type="radio" id="psicofarmacos_si" name="psicofarmacos" value="SI" required onchange="psicoCheck()">
        <label for="psicofarmacos_si">Sí</label><br>
        <input type="radio" id="psicofarmacos_no" name="psicofarmacos" value="NO" onchange="psicoCheck()">
        <label for="psicofarmacos_no">No</label><br><br>

        <div id="div-psicofarmacos" style="display: none;">
            <label class="info-q">11. ¿Desde hace cuánto?</label><br>
            <input type="radio" id="tiempo_6m" name="tiempo_psicofarmacos" value="6 meses o menos">
            <label for="tiempo_6m">6 meses o menos</label><br>
            <input type="radio" id="tiempo_1a" name="tiempo_psicofarmacos" value="1 año">
            <label for="tiempo_1a">1 año</label><br>
            <input type="radio" id="tiempo_2a" name="tiempo_psicofarmacos" value="2 años o más">
            <label for="tiempo_2a">2 años o más</label><br><br>

            <label class="info-q">12. ¿Cuáles? (elegí uno o más de uno)</label><br>
            <input type="checkbox" id="tipo_antidepresivos" name="tipo_antidepresivos" value="antidepresivos">
            <label for="tipo_antidepresivos">Antidepresivos (sertralina, venlafaxina, bupropion, escitalopram, fluoxetina, paroxetina, duloxetina, amitriptilina, imipramina)</label><br>
            
            <input type="checkbox" id="tipo_ansioliticos" name="tipo_ansioliticos" value="ansioliticos">
            <label for="tipo_ansioliticos">Ansiolíticos o hipnóticos (clonazepam, flunitrazepam, diazepam, alprazolam, broomazepam, zolpidem, zopiclona)</label><br>
            
            <input type="checkbox" id="tipo_neurolepticos" name="tipo_neurolepticos" value="neurolepticos">
            <label for="tipo_neurolepticos">Neurolépticos/antipsicóticos (haloperidol, clorpromazina, levomepromazina, risperidona, clozapina, olanzapina, quetiapina, aripiprazol, lurasidona)</label><br>
            
            <input type="checkbox" id="tipo_reguladores" name="tipo_reguladores" value="reguladores">
            <label for="tipo_reguladores">Reguladores del humor (litio, ácido valpróico, valproato de sodio, carbamazepina, lamotrigina, topiramato, gabapentina, pregabalina)</label><br><br>
        </div>

        <label class="info-q">13. Durante el último año y medio, ¿tuviste alguna consulta con psiquiatra en puerta de emergencia?</label><br>
        <input type="radio" id="emergencia_si" name="emergencia" value="si" required>
        <label for="emergencia_si">Sí</label><br>
        <input type="radio" id="emergencia_no" name="emergencia" value="no">
        <label for="emergencia_no">No</label><br><br>

        <label class="info-q">14. Durante el último año y medio, ¿tuviste algún ingreso de internación en alguna clínica de agudos (de tipo psiquiátrica)?</label><br>
        <input type="radio" id="internacion_si" name="internacion" value="si" required>
        <label for="internacion_si">Sí</label><br>
        <input type="radio" id="internacion_no" name="internacion" value="no">
        <label for="internacion_no">No</label><br><br>

        <label class="info-q">15. Durante el último año y medio, ¿te hicieron algún diagnóstico de salud mental evaluado por psiquiatra?</label><br>
        <input type="radio" id="diagnostico_si" name="diagnostico" value="si" required onchange="diagCheck()">
        <label for="diagnostico_si">Sí</label><br>
        <input type="radio" id="diagnostico_no" name="diagnostico" value="no" onchange="diagCheck()">
        <label for="diagnostico_no">No</label><br><br>

        <div id="div-diagnostico" style="display: none;">
            <label class="info-q">16. ¿Cuál diagnóstico?</label><br>
            <input type="checkbox" id="diag_psicosis" name="diag_psicosis" value="Psicosis delirante aguda o Episodio psicótico agudo">
            <label for="diag_psicosis">Psicosis delirante aguda o Episodio psicótico agudo</label><br>
            
            <input type="checkbox" id="diag_inducido" name="diag_inducido" value="Episodio psicótico inducido por sustancias">
            <label for="diag_inducido">Episodio psicótico inducido por sustancias</label><br>
            
            <input type="checkbox" id="diag_esquizofrenia" name="diag_esquizofrenia" value="Esquizofrenia">
            <label for="diag_esquizofrenia">Esquizofrenia</label><br>
            
            <input type="checkbox" id="diag_bipolar" name="diag_bipolar" value="Trastorno bipolar">
            <label for="diag_bipolar">Trastorno bipolar</label><br>
            
            <input type="checkbox" id="diag_ansiedad" name="diag_ansiedad" value="Trastorno de ansiedad">
            <label for="diag_ansiedad">Trastorno de ansiedad</label><br>
            
            <input type="checkbox" id="diag_depresion" name="diag_depresion" value="Depresión">
            <label for="diag_depresion">Depresión</label><br>
            
            <input type="checkbox" id="diag_esquizotipica" name="diag_esquizotipica" value="Trastorno de personalidad esquizotípica">
            <label for="diag_esquizotipica">Trastorno de personalidad esquizotípica</label><br>
            
            <input type="checkbox" id="diag_esquizoide" name="diag_esquizoide" value="Trastorno de personalidad esquizoide">
            <label for="diag_esquizoide">Trastorno de personalidad esquizoide</label><br><br>
        </div>

        <input type="submit" value="Siguiente">
    </form>
    </main>

    <script>
    // Inicializar el formulario al cargar la página
    window.onload = function() {
        genderCheck();
    };

    function genderCheck() {
        var sd = document.getElementById('self_describe');
        var div_pref = document.getElementById('div-prefiero');
        if (sd.checked) {
            div_pref.style.display = 'block';
        } else {
            div_pref.style.display = 'none';
        }
    }

    function psicoCheck() {
        var si = document.getElementById('psicofarmacos_si');
        var div = document.getElementById('div-psicofarmacos');
        if (si.checked) {
            div.style.display = 'block';
            // Make fields required
            document.querySelectorAll('#div-psicofarmacos input[type="radio"]').forEach(function(input) {
                if (input.name === 'tiempo_psicofarmacos') {
                    input.required = true;
                }
            });
        } else {
            div.style.display = 'none';
            // Remove required
            document.querySelectorAll('#div-psicofarmacos input[type="radio"]').forEach(function(input) {
                input.required = false;
            });
        }
    }

    function diagCheck() {
        var si = document.getElementById('diagnostico_si');
        var div = document.getElementById('div-diagnostico');
        if (si.checked) {
            div.style.display = 'block';
        } else {
            div.style.display = 'none';
        }
    }
    </script>    
</body>
</html>
